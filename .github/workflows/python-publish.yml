name: Python Package

on:
  push:
    paths:
      - 'kirun-py/**'
  pull_request:
    paths:
      - 'kirun-py/**'
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        working-directory: ./kirun-py
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: ./kirun-py
        run: pytest --cov=kirun_py --cov-report=term-missing

  publish-pypi:
    needs: test
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'kirun-py-')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build
      - name: Build package
        working-directory: ./kirun-py
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: kirun-py/dist/
